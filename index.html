<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Permissions-Policy" content="camera=*">
<title>RESOUND – Volunteer Check-in</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
/* ── RESET & BASE ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06061a;
  --surface:rgba(14,12,38,.9);
  --violet:#a78bfa;
  --green:#34d399;
  --rose:#fb7185;
  --amber:#fbbf24;
  --text-hi:#f0eeff;
  --text-mid:rgba(230,225,255,.55);
  --text-lo:rgba(230,225,255,.28);
  --font:'system-ui',-apple-system,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text-hi);font-family:var(--font);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 15% 20%,rgba(109,40,217,.18) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 75%,rgba(99,102,241,.14) 0%,transparent 55%);
}

/* ── LAYOUT ─────────────────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:10;width:100%;
  background:rgba(10,8,30,.95);border-bottom:1px solid rgba(167,139,250,.15);
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(12px);
}
.logo{font-size:1rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--violet);text-shadow:0 0 14px rgba(167,139,250,.4)}
.badge{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);border-radius:100px;padding:4px 14px;font-size:.65rem;letter-spacing:.1em;font-weight:700;color:var(--violet);text-transform:uppercase}
.body{position:relative;z-index:1;width:100%;max-width:500px;padding:24px 16px 60px;display:flex;flex-direction:column;gap:20px}

/* ── CONFIG PANEL ───────────────────────────────────────── */
.config-card{background:var(--surface);border:1px solid rgba(167,139,250,.18);border-radius:18px;padding:22px 20px}
.config-title{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(167,139,250,.6);margin-bottom:14px}
.config-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.config-row:last-child{margin-bottom:0}
.config-label{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mid)}
.config-input{
  width:100%;background:rgba(167,139,250,.05);border:1.5px solid rgba(167,139,250,.15);
  border-radius:10px;padding:11px 14px;font-size:.9rem;color:#fff;outline:none;
  font-family:var(--font);transition:border-color .25s;
}
.config-input:focus{border-color:var(--violet);background:rgba(167,139,250,.08)}
.config-input::placeholder{color:rgba(255,255,255,.2)}
.save-btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#6d28d9,#a78bfa);color:#fff;
  font-size:.88rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;margin-top:4px;transition:opacity .2s;
}
.save-btn:hover{opacity:.88}
.save-hint{font-size:.7rem;color:var(--text-lo);text-align:center;margin-top:8px;line-height:1.5}

/* ── SCANNER CARD ───────────────────────────────────────── */
.scanner-card{background:var(--surface);border:1px solid rgba(167,139,250,.18);border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.7)}
.scanner-card-header{padding:16px 20px;border-bottom:1px solid rgba(167,139,250,.1);display:flex;align-items:center;gap:10px}
.scanner-icon{font-size:1.4rem}
.scanner-title{font-size:.95rem;font-weight:900;letter-spacing:.06em;color:var(--text-hi)}
.scanner-sub{font-size:.72rem;color:var(--text-lo);letter-spacing:.04em;margin-top:2px}
#reader{width:100%!important;border:none!important;background:#000}
#reader video{border-radius:0!important}
#reader__scan_region{background:#000!important}
#reader__dashboard{background:rgba(14,12,38,.95)!important;border-top:1px solid rgba(167,139,250,.1)!important;padding:12px 16px!important}
#reader__dashboard_section_swaplink{color:var(--violet)!important;font-size:.75rem!important}
#reader__status_span{color:var(--text-mid)!important;font-size:.8rem!important}
.scanner-status{padding:14px 20px;border-top:1px solid rgba(167,139,250,.08);display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:dp 1.5s ease-in-out infinite}
.dot.scanning{background:var(--violet);animation:dv 1s ease-in-out infinite}
.dot.idle{background:rgba(255,255,255,.2);animation:none}
@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}50%{box-shadow:0 0 0 5px rgba(52,211,153,0)}}
@keyframes dv{0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,.5)}50%{box-shadow:0 0 0 5px rgba(167,139,250,0)}}
.status-text{font-size:.78rem;color:var(--text-mid)}

/* ── RESULT ─────────────────────────────────────────────── */
.result{width:100%;border-radius:16px;padding:24px 22px;display:none;flex-direction:column;align-items:center;gap:8px;text-align:center;animation:pop .4s cubic-bezier(.22,.68,0,1.2) both}
.result.on{display:flex}
.result.success{background:rgba(52,211,153,.08);border:1.5px solid rgba(52,211,153,.35)}
.result.error{background:rgba(251,113,133,.07);border:1.5px solid rgba(251,113,133,.3)}
.result.warning{background:rgba(251,191,36,.07);border:1.5px solid rgba(251,191,36,.3)}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.r-glyph{font-size:3rem;line-height:1;margin-bottom:4px}
.r-status{font-size:1.4rem;font-weight:900;letter-spacing:.04em}
.result.success .r-status{color:var(--green)}
.result.error   .r-status{color:var(--rose)}
.result.warning .r-status{color:var(--amber)}
.r-name{font-size:1.1rem;font-weight:700;color:var(--text-hi);margin-top:2px}
.r-seats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.r-chip{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.35);border-radius:100px;padding:4px 14px;font-size:.8rem;font-weight:900;color:#c4b5fd}
.r-msg{font-size:.82rem;color:var(--text-mid);margin-top:4px;line-height:1.5}

/* ── LOG ────────────────────────────────────────────────── */
.log-card{background:var(--surface);border:1px solid rgba(167,139,250,.12);border-radius:14px;padding:16px 18px}
.log-title{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-lo);font-weight:700;margin-bottom:10px}
.log-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.log-item{display:flex;align-items:center;gap:10px;font-size:.75rem;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.log-item:last-child{border-bottom:none}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.log-dot.ok{background:var(--green)}.log-dot.err{background:var(--rose)}.log-dot.warn{background:var(--amber)}
.log-name{flex:1;color:var(--text-hi);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-seats{color:#c4b5fd;font-size:.7rem}
.log-time{color:var(--text-lo);font-size:.65rem;flex-shrink:0}
.log-empty{color:var(--text-lo);font-size:.75rem;text-align:center;padding:12px 0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">✦ RESOUND</div>
  <div class="badge">Volunteer Check-in</div>
</div>

<div class="body">

  <!-- Config Panel -->
  <div class="config-card" id="config-card">
    <div class="config-title">⚙️ Setup (one-time)</div>
    <div class="config-row">
      <div class="config-label">GAS Web App URL</div>
      <input class="config-input" id="cfg-url" type="url" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off">
    </div>
    <div class="config-row">
      <div class="config-label">Admin Secret</div>
      <input class="config-input" id="cfg-secret" type="password" placeholder="Enter the secret from Code.gs" autocomplete="off">
    </div>
    <button class="save-btn" onclick="saveConfig()">Save &amp; Start Scanner</button>
    <div class="save-hint">These are saved locally on this device only.<br>Never share this page's URL publicly.</div>
  </div>

  <!-- Scanner Card (hidden until config saved) -->
  <div class="scanner-card" id="scanner-card" style="display:none">
    <div class="scanner-card-header">
      <div class="scanner-icon">📷</div>
      <div>
        <div class="scanner-title">QR Code Scanner</div>
        <div class="scanner-sub">Point camera at a guest's confirmation QR code</div>
      </div>
    </div>
    <div id="reader"></div>
    <div class="scanner-status">
      <div class="dot scanning" id="status-dot"></div>
      <div class="status-text" id="status-text">Initialising camera…</div>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="r-glyph" id="r-glyph"></div>
    <div class="r-status" id="r-status"></div>
    <div class="r-name" id="r-name"></div>
    <div class="r-seats" id="r-seats"></div>
    <div class="r-msg" id="r-msg"></div>
  </div>

  <!-- Debug Panel (always visible after first scan) -->
  <div id="debug-panel" style="display:none;background:rgba(0,0,0,.5);border:1px solid rgba(167,139,250,.2);border-radius:14px;padding:14px 16px;">
    <div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(167,139,250,.5);font-weight:700;margin-bottom:8px;">🔍 Debug log</div>
    <div id="debug-list"></div>
  </div>

  <!-- Scan Log -->
  <div class="log-card" id="log-card" style="display:none">
    <div class="log-title">Recent Scans</div>
    <div class="log-list" id="log-list">
      <div class="log-empty" id="log-empty">No scans yet — ready to go!</div>
    </div>
  </div>

</div><!-- /body -->

<script>
/* ── CONFIG ─────────────────────────────────────────────── */
var GAS_URL    = '';
var ADMIN_SECRET = '';
var _scanner   = null;
var _running   = false;
var _cooldown  = false;

function saveConfig(){
  var url    = document.getElementById('cfg-url').value.trim();
  var secret = document.getElementById('cfg-secret').value.trim();
  if(!url || !secret){ alert('Please fill in both fields.'); return; }
  localStorage.setItem('resound_gas_url', url);
  localStorage.setItem('resound_secret', secret);
  GAS_URL = url; ADMIN_SECRET = secret;
  document.getElementById('config-card').style.display = 'none';
  document.getElementById('scanner-card').style.display = 'block';
  document.getElementById('log-card').style.display = 'block';
  initScanner();
}

// Auto-load saved config
(function(){
  var url    = localStorage.getItem('resound_gas_url');
  var secret = localStorage.getItem('resound_secret');
  if(url && secret){
    document.getElementById('cfg-url').value    = url;
    document.getElementById('cfg-secret').value = secret;
    GAS_URL = url; ADMIN_SECRET = secret;
    document.getElementById('config-card').style.display = 'none';
    document.getElementById('scanner-card').style.display = 'block';
    document.getElementById('log-card').style.display = 'block';
    // Small delay so html5-qrcode lib is ready
    setTimeout(initScanner, 400);
  }
})();

/* ── SCANNER ─────────────────────────────────────────────── */
function initScanner(){
  var dot  = document.getElementById('status-dot');
  var text = document.getElementById('status-text');

  if(typeof Html5Qrcode === 'undefined'){
    dot.className  = 'dot idle';
    text.textContent = 'Scanner library failed to load. Check your connection.';
    return;
  }

  _scanner = new Html5Qrcode('reader');

  _scanner.start(
    { facingMode: 'environment' },
    { fps:10, qrbox:{ width:240, height:240 }, supportedScanTypes:[Html5QrcodeScanType.SCAN_TYPE_CAMERA] },
    onScan,
    function(){}
  ).then(function(){
    _running = true;
    dot.className    = 'dot scanning';
    text.textContent = 'Scanner active — waiting for QR code…';
  }).catch(function(err){
    dot.className  = 'dot idle';
    var isBlocked  = /NotAllowed|Permission|denied/i.test(String(err));
    if(isBlocked){
      text.textContent = 'Camera blocked — tap the 🔒 icon in the address bar and allow camera, then reload.';
    } else {
      text.textContent = 'Camera error: ' + err;
    }
  });
}

/* ── DEBUG PANEL ────────────────────────────────────────── */
function debugLog(msg){
  var panel = document.getElementById('debug-panel');
  var list  = document.getElementById('debug-list');
  if(!panel || !list) return;
  panel.style.display = 'block';
  var item = document.createElement('div');
  item.style.cssText = 'font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.06);word-break:break-all;color:var(--text-hi);font-family:monospace;';
  item.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  if(list.firstChild) list.insertBefore(item, list.firstChild);
  else list.appendChild(item);
  // Keep last 10
  var items = list.children;
  while(items.length > 10) list.removeChild(list.lastChild);
}

/* ── SCAN HANDLER ───────────────────────────────────────── */
function onScan(text){
  if(_cooldown) return;
  _cooldown = true;
  if(_scanner && _running) try{ _scanner.pause(true); }catch(e){}

  var dot  = document.getElementById('status-dot');
  var stxt = document.getElementById('status-text');
  dot.className    = 'dot idle';
  stxt.textContent = 'Processing scan…';

  var sessionId = text.trim();
  debugLog('Scanned: ' + sessionId);

  var url = GAS_URL
    + '?action=checkin'
    + '&sessionId=' + encodeURIComponent(sessionId)
    + '&secret='    + encodeURIComponent(ADMIN_SECRET);

  debugLog('Calling: ' + url.substring(0, 80) + '…');

  fetch(url)
  .then(function(r){
    debugLog('HTTP status: ' + r.status);
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(function(txt){
    debugLog('Raw response: ' + txt.substring(0, 200));
    try { return JSON.parse(txt); }
    catch(e) { throw new Error('Not JSON — got: ' + txt.substring(0, 120)); }
  })
  .then(function(result){
    debugLog('Parsed: success=' + result.success + (result.error ? ' error=' + result.error : '') + (result.guestName ? ' name=' + result.guestName : ''));
    showResult(result);
  })
  .catch(function(err){
    debugLog('CATCH: ' + err);
    showResult({ success:false, error: String(err) });
  });
}

/* ── DISPLAY RESULT ─────────────────────────────────────── */
function showResult(result){
  var el    = document.getElementById('result');
  var glyph = document.getElementById('r-glyph');
  var stat  = document.getElementById('r-status');
  var name  = document.getElementById('r-name');
  var seats = document.getElementById('r-seats');
  var msg   = document.getElementById('r-msg');

  seats.innerHTML = '';
  msg.textContent = '';
  name.textContent = '';

  if(result.success){
    if(result.alreadyIn){
      el.className   = 'result warning on';
      glyph.textContent = '⚠️';
      stat.textContent  = 'Already Checked In';
      name.textContent  = result.guestName + ' was already scanned.';
      addLog('warn', result.guestName, result.seats || []);
    } else {
      el.className   = 'result success on';
      glyph.textContent = '✅';
      stat.textContent  = 'Welcome!';
      name.textContent  = result.guestName || 'Guest';
      addLog('ok', result.guestName || 'Guest', result.seats || []);
    }
    (result.seats || []).forEach(function(s){
      var chip = document.createElement('div');
      chip.className = 'r-chip';
      chip.textContent = '✦ Seat ' + s;
      seats.appendChild(chip);
    });
  } else {
    el.className = 'result error on';
    glyph.textContent = '❌';
    stat.textContent  = 'Not Found';
    msg.textContent   = result.error || 'This QR code is not valid or the booking was not confirmed.';
    addLog('err', result.error || 'Unknown error', []);
  }

  // Resume after 3s
  setTimeout(function(){
    el.className = 'result';
    _cooldown    = false;
    if(_scanner && _running){
      try{ _scanner.resume(); }catch(e){}
      document.getElementById('status-dot').className    = 'dot scanning';
      document.getElementById('status-text').textContent = 'Scanner active — waiting for QR code…';
    }
  }, 3000);
}

/* ── LOG ────────────────────────────────────────────────── */
function addLog(type, name, seatArr){
  var list  = document.getElementById('log-list');
  var empty = document.getElementById('log-empty');
  if(empty) empty.remove();
  var now   = new Date();
  var t     = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var item  = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML =
    '<div class="log-dot '+type+'"></div>'
    +'<div class="log-name">'+esc(name)+'</div>'
    +(seatArr.length ? '<div class="log-seats">'+seatArr.map(function(s){return '#'+s;}).join(', ')+'</div>' : '')
    +'<div class="log-time">'+t+'</div>';
  if(list.firstChild) list.insertBefore(item, list.firstChild);
  else list.appendChild(item);
  var items = list.querySelectorAll('.log-item');
  if(items.length > 20) items[items.length-1].remove();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
